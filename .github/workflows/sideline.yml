name: Sideline Veille
#
# Veille quotidienne sport/marchés publics — quotas gratuits
# ─ GitHub Actions : repo public → minutes illimitées
# ─ SerpAPI         : 100 recherches/mois gratuit
#                     v5 (2026-04-19) : 4 req/run × 5 j/sem (lundi-vendredi)
#                     4 × ~22 jours ouvrés = ~88/mois → marge ~12 req
#                     → cf. bloc conditionnel `DAY=1..5` (pas le week-end)
# ─ BOAMP API ODS   : sans clé, rate-limit implicite ~correct
# ─ Brevo SMTP      : 300 mails/jour gratuit
#
on:
  schedule:
    # Tous les jours à 13h00 Paris (11h UTC été / 12h UTC hiver)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de lancement'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - test
      only:
        description: 'Moteur uniquement (optionnel)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - rss
          - google
          - linkedin

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Préparer l'arborescence
        run: mkdir -p data logs

      - name: Restaurer données depuis le dépôt
        run: |
          git config user.name "Sideline Veille Bot"
          git config user.email "cyrilmourin@gmail.com"
          echo "Données existantes conservées depuis le dépôt"
        continue-on-error: true

      - name: Lancer le scraper
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:     ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_DESTINATAIRE: ${{ secrets.GMAIL_DESTINATAIRE }}
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          RUN_MODE:           ${{ github.event.inputs.mode || 'normal' }}
          ONLY_MODE:          ${{ github.event.inputs.only || '' }}
        run: |
          # SerpAPI du lundi au vendredi (1-5), RSS-only le week-end
          DAY=$(date +%u)
          if [ "$ONLY_MODE" != "" ]; then
            python scraper.py --only $ONLY_MODE
          elif [ "$RUN_MODE" = "test" ]; then
            python scraper.py --test
          elif [ "$DAY" -ge 1 ] && [ "$DAY" -le 5 ]; then
            echo "Jour ouvre ($DAY) — veille complete (RSS + SerpAPI + LinkedIn)"
            python scraper.py
          else
            echo "Week-end ($DAY) — RSS uniquement (preserve quota SerpAPI)"
            python scraper.py --only rss
          fi

      - name: Sauvegarder opportunites.json dans le dépôt
        run: |
          git config user.name "Sideline Veille Bot"
          git config user.email "cyrilmourin@gmail.com"
          git add data/opportunites.json data/seen_ids.json || true
          git diff --staged --quiet || git commit -m "data: mise a jour opportunites [skip ci]"
          git push

      - name: Archiver les logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
