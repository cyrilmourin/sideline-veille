name: Sideline Veille — Scraping quotidien

on:
  schedule:
    # RSS/HTML tous les jours à 8h00 Paris (7h UTC été)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de lancement'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - test
      only:
        description: 'Moteur uniquement (optionnel)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - rss
          - google
          - linkedin

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Préparer l'arborescence
        run: mkdir -p data logs

      - name: Restaurer données depuis le dépôt
        run: |
          git config user.name "Sideline Veille Bot"
          git config user.email "cyrilmourin@gmail.com"
          git pull origin main || true
          echo "Données restaurées depuis le dépôt"

      - name: Lancer le scraper
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:     ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_DESTINATAIRE: ${{ secrets.GMAIL_DESTINATAIRE }}
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          RUN_MODE:           ${{ github.event.inputs.mode || 'normal' }}
          ONLY_MODE:          ${{ github.event.inputs.only || '' }}
        run: |
          # SerpAPI uniquement le lundi (1) et jeudi (4)
          DAY=$(date +%u)
          if [ "$ONLY_MODE" != "" ]; then
            python scraper.py --only $ONLY_MODE
          elif [ "$RUN_MODE" = "test" ]; then
            python scraper.py --test
          elif [ "$DAY" = "1" ] || [ "$DAY" = "4" ]; then
            echo "Jour SerpAPI (lundi ou jeudi) — veille complete"
            python scraper.py
          else
            echo "Jour RSS uniquement"
            python scraper.py --only rss
          fi

      - name: Sauvegarder opportunites.json dans le dépôt
        run: |
          git config user.name "Sideline Veille Bot"
          git config user.email "cyrilmourin@gmail.com"
          git add data/opportunites.json data/seen_ids.json || true
          git diff --staged --quiet || git commit -m "data: mise a jour opportunites [skip ci]"
          git push

      - name: Archiver les logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
